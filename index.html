<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - KB TECH</title>
    <style>
        /* Reset e Variáveis */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --preto: #121212;
            --cinza-escuro: #1E1E1E;
            --azul-eletrico: #007BFF;
            --azul-hover: #0056b3;
            --branco: #F8F9FA;
            --texto: #333;
            --borda: #ddd;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--branco);
            color: var(--texto);
        }

        /* Menu Lateral */
        .sidebar {
            width: 250px;
            background-color: var(--preto);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .logo {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background-color: var(--cinza-escuro);
            border-bottom: 2px solid var(--azul-eletrico);
            color: var(--azul-eletrico);
        }

        .menu {
            list-style: none;
            padding: 20px 0;
        }

        .menu li {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu li:hover, .menu li.active {
            background-color: var(--azul-eletrico);
        }

        /* Área de Conteúdo */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--borda);
            padding-bottom: 10px;
        }

        /* Formulários e Botões */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--borda);
            border-radius: 5px;
            outline: none;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--azul-eletrico);
        }

        .btn {
            background-color: var(--azul-eletrico);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: var(--azul-hover);
        }

        /* Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        table th, table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--borda);
        }

        table th {
            background-color: var(--cinza-escuro);
            color: white;
        }

        /* Controle de Telas */
        .tela {
            display: none;
        }
        .tela.ativa {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Menu Lateral -->
    <nav class="sidebar">
        <div class="logo">KB TECH</div>
        <ul class="menu">
            <li onclick="mudarTela('dashboard')">Dashboard</li>
            <li onclick="mudarTela('clientes')" class="active">Clientes</li>
            <li>Ordens de Serviço</li>
            <li>Garantias</li>
            <li>Financeiro</li>
        </ul>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="content">

        <!-- Tela: Dashboard (Em construção) -->
        <section id="dashboard" class="tela">
            <div class="header">
                <h2>Dashboard</h2>
            </div>
            <p>Resumo financeiro e painel geral virão aqui.</p>
        </section>

        <!-- Tela: Clientes -->
        <section id="clientes" class="tela ativa">
            <div class="header">
                <h2>Gestão de Clientes</h2>
            </div>
            
            <div style="background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 30px;">
                <h3>+ Novo Cliente</h3>
                <br>
                <form id="formCliente" onsubmit="salvarCliente(event)">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Nome Completo</label>
                            <input type="text" id="cliNome" required>
                        </div>
                        <div class="form-group">
                            <label>CPF</label>
                            <input type="text" id="cliCPF" required>
                        </div>
                        <div class="form-group">
                            <label>Telefone / WhatsApp</label>
                            <input type="text" id="cliTelefone" required>
                        </div>
                        <div class="form-group">
                            <label>Data de Nascimento</label>
                            <input type="date" id="cliNascimento">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Endereço Completo</label>
                        <input type="text" id="cliEndereco">
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea id="cliObs" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn">Salvar Cliente</button>
                </form>
            </div>

            <h3>Clientes Cadastrados</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Telefone</th>
                        <th>Data de Cadastro</th>
                    </tr>
                </thead>
                <tbody id="tabelaClientes">
                    <!-- Clientes aparecerão aqui -->
                </tbody>
            </table>
        </section>

    </main>

    <!-- Lógica do Sistema (JavaScript) -->
    <script>
        // Chave do LocalStorage
        const CHAVE_CLIENTES = 'kbtech_clientes';

        // Inicializa o sistema carregando a tabela
        document.addEventListener('DOMContentLoaded', () => {
            carregarClientes();
        });

        // Função para alternar entre as telas do menu
        function mudarTela(idTela) {
            document.querySelectorAll('.tela').forEach(tela => {
                tela.classList.remove('ativa');
            });
            document.getElementById(idTela).classList.add('ativa');
        }

        // Função para salvar o cliente no LocalStorage
        function salvarCliente(event) {
            event.preventDefault(); // Evita recarregar a página

            // Captura os valores do formulário
            const novoCliente = {
                id: Date.now(), // Gera um ID único baseado no tempo
                nome: document.getElementById('cliNome').value,
                cpf: document.getElementById('cliCPF').value,
                telefone: document.getElementById('cliTelefone').value,
                nascimento: document.getElementById('cliNascimento').value,
                endereco: document.getElementById('cliEndereco').value,
                observacoes: document.getElementById('cliObs').value,
                dataCadastro: new Date().toLocaleDateString('pt-BR')
            };

            // Busca clientes já salvos ou cria um array vazio
            let clientes = JSON.parse(localStorage.getItem(CHAVE_CLIENTES)) || [];
            
            // Adiciona o novo cliente
            clientes.push(novoCliente);

            // Salva de volta no LocalStorage
            localStorage.setItem(CHAVE_CLIENTES, JSON.stringify(clientes));

            // Limpa o formulário e atualiza a tabela
            document.getElementById('formCliente').reset();
            carregarClientes();
            
            alert('Cliente salvo com sucesso!');
        }

        // Função para ler o LocalStorage e preencher a tabela
        function carregarClientes() {
            const tbody = document.getElementById('tabelaClientes');
            tbody.innerHTML = ''; // Limpa a tabela antes de preencher

            let clientes = JSON.parse(localStorage.getItem(CHAVE_CLIENTES)) || [];

            if (clientes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">Nenhum cliente cadastrado.</td></tr>';
                return;
            }

            // Percorre o array e cria as linhas da tabela
            clientes.forEach(cliente => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${cliente.nome}</td>
                    <td>${cliente.cpf}</td>
                    <td>${cliente.telefone}</td>
                    <td>${cliente.dataCadastro}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
